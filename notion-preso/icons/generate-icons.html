<canvas id="c16" width="16" height="16"></canvas>
<canvas id="c48" width="48" height="48"></canvas>
<canvas id="c128" width="128" height="128"></canvas>
<script>
function draw(id, size) {
  const c = document.getElementById(id).getContext('2d');
  // Background circle
  c.fillStyle = '#2BF2F1';
  c.beginPath();
  c.arc(size/2, size/2, size/2, 0, Math.PI*2);
  c.fill();
  // P letter
  c.fillStyle = '#082422';
  c.font = `bold ${size*0.6}px sans-serif`;
  c.textAlign = 'center';
  c.textBaseline = 'middle';
  c.fillText('P', size/2, size/2+size*0.03);
}
draw('c16', 16);
draw('c48', 48);
draw('c128', 128);
</script>
